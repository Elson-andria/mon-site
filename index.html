<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon Portfolio</title>

  <style>

    body{
      margin:0;
      font-family:Arial;
      background:#111;
      color:white;
    }

    nav{
      background:black;
      padding:20px;
      text-align:center;
      position:fixed;
      width:100%;
      top:0;
    }

    nav a{
      color:white;
      text-decoration:none;
      margin:20px;
      font-size:18px;
    }

    nav a:hover{
      color:orange;
    }

    section{
      min-height:100vh;
      padding:120px 40px;
    }

    #accueil{
      background:#222;
    }

    #services{
      background:#333;
    }

    #portfolio{
      background:#444;
    }

    #contact{
      background:#555;
    }

    .card{
      background:white;
      color:black;
      padding:20px;
      margin:20px 0;
      border-radius:10px;
    }

    input, textarea{
      width:100%;
      padding:10px;
      margin-top:10px;
    }

    button{
      margin-top:10px;
      padding:10px 20px;
      background:orange;
      border:none;
      cursor:pointer;
    }

  </style>
</head>

<body>

  <nav>
    <a href="#accueil">Accueil</a>
    <a href="#services">Services</a>
    <a href="#portfolio">Portfolio</a>
    <a href="#contact">Contact</a>
  </nav>

  <section id="accueil">
    <h1>Bienvenue sur mon site</h1>
    <p>Je suis développeur web débutant et assistant virtuel.</p>
  </section>

  <section id="services">
    <h1>Mes Services</h1>

    <div class="card">
      Création de site HTML/CSS
    </div>

    <div class="card">
      Modification de site web
    </div>

    <div class="card">
      Assistance virtuelle
    </div>

  </section>

  <section id="portfolio">
    <h1>Mon Portfolio</h1>

    <div class="card">
      Projet 1 : Mon premier site
    </div>

    <div class="card">
      Projet 2 : Page professionnelle
    </div>

  </section>

  <section id="contact">
    <h1>Contact</h1>

    <form>
      <input type="text" placeholder="Votre nom">
      <input type="email" placeholder="Votre email">
      <textarea placeholder="Votre message"></textarea>
      <button>Envoyer</button>
    </form>

  </section>

</body>
</html>
